<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTP CDS App - Product Catalog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
    }
    
    .controls {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #764ba2;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: white;
      font-size: 18px;
    }
    
    .error {
      background: #ff6b6b;
      color: white;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    
    .success {
      background: #51cf66;
      color: white;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    th {
      background: #667eea;
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }
    
    td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
    }
    
    tr:hover {
      background: #f5f5f5;
    }
    
    tr:last-child td {
      border-bottom: none;
    }
    
    .badge {
      display: inline-block;
      background: #764ba2;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .price {
      font-weight: 600;
      color: #667eea;
    }
    
    .stock {
      font-weight: 600;
    }
    
    .stock.low {
      color: #ff6b6b;
    }
    
    .stock.medium {
      color: #ffd43b;
    }
    
    .stock.high {
      color: #51cf66;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
    }
    
    .stat-label {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 Product Catalog</h1>
      <p class="subtitle">Simple BTP CDS Application for displaying products</p>
      <div class="controls">
        <button onclick="loadProducts()">🔄 Refresh Products</button>
        <button onclick="loadCategories()">📂 Load Categories</button>
      </div>
      <div id="message"></div>
      <div class="stats" id="stats"></div>
    </div>
    
    <div id="content">
      <div class="loading">Loading data...</div>
    </div>
  </div>

  <script>
    const API_BASE = '/odata/v4/catalog-service';

    async function loadProducts() {
      try {
        document.getElementById('message').innerHTML = '';
        document.getElementById('content').innerHTML = '<div class="loading">Loading products...</div>';
        
        const response = await fetch(`${API_BASE}/Products`);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const data = await response.json();
        const products = data.value || [];
        
        displayProducts(products);
        updateStats(products);
        showMessage(`Successfully loaded ${products.length} products`, 'success');
      } catch (error) {
        console.error('Error:', error);
        showMessage(`Error loading products: ${error.message}`, 'error');
        document.getElementById('content').innerHTML = `
          <div style="background: white; padding: 30px; border-radius: 10px;">
            <p>Unable to connect to the service. Make sure the CDS service is running.</p>
            <pre style="margin-top: 10px; background: #f5f5f5; padding: 10px; overflow-x: auto;">
${error.message}</pre>
          </div>
        `;
      }
    }

    async function loadCategories() {
      try {
        document.getElementById('message').innerHTML = '';
        document.getElementById('content').innerHTML = '<div class="loading">Loading categories...</div>';
        
        const response = await fetch(`${API_BASE}/Categories`);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const data = await response.json();
        const categories = data.value || [];
        
        displayCategories(categories);
        showMessage(`Successfully loaded ${categories.length} categories`, 'success');
      } catch (error) {
        console.error('Error:', error);
        showMessage(`Error loading categories: ${error.message}`, 'error');
      }
    }

    function displayProducts(products) {
      if (products.length === 0) {
        document.getElementById('content').innerHTML = '<div style="background: white; padding: 30px; border-radius: 10px; text-align: center; color: #999;">No products found</div>';
        return;
      }

      const html = `
        <table>
          <thead>
            <tr>
              <th>Product ID</th>
              <th>Name</th>
              <th>Description</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Category</th>
            </tr>
          </thead>
          <tbody>
            ${products.map(p => `
              <tr>
                <td>${p.ID}</td>
                <td><strong>${p.name}</strong></td>
                <td>${p.description || '-'}</td>
                <td class="price">$${parseFloat(p.price).toFixed(2)}</td>
                <td class="stock ${getStockClass(p.stock)}">${p.stock} units</td>
                <td><span class="badge">${p.category || 'Uncategorized'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('content').innerHTML = html;
    }

    function displayCategories(categories) {
      if (categories.length === 0) {
        document.getElementById('content').innerHTML = '<div style="background: white; padding: 30px; border-radius: 10px; text-align: center; color: #999;">No categories found</div>';
        return;
      }

      const html = `
        <table>
          <thead>
            <tr>
              <th>Category ID</th>
              <th>Name</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            ${categories.map(c => `
              <tr>
                <td>${c.ID}</td>
                <td><strong>${c.name}</strong></td>
                <td>${c.description || '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('content').innerHTML = html;
    }

    function updateStats(products) {
      const totalProducts = products.length;
      const totalValue = products.reduce((sum, p) => sum + (parseFloat(p.price) * p.stock), 0);
      const totalStock = products.reduce((sum, p) => sum + p.stock, 0);
      const avgPrice = (products.reduce((sum, p) => sum + parseFloat(p.price), 0) / totalProducts).toFixed(2);

      const statsHtml = `
        <div class="stat-card">
          <div class="stat-value">${totalProducts}</div>
          <div class="stat-label">Total Products</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalStock}</div>
          <div class="stat-label">Total Stock</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">$${totalValue.toFixed(2)}</div>
          <div class="stat-label">Total Inventory Value</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">$${avgPrice}</div>
          <div class="stat-label">Average Price</div>
        </div>
      `;
      document.getElementById('stats').innerHTML = statsHtml;
    }

    function getStockClass(stock) {
      if (stock < 50) return 'low';
      if (stock < 150) return 'medium';
      return 'high';
    }

    function showMessage(msg, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="${type}">${msg}</div>`;
      setTimeout(() => {
        messageDiv.innerHTML = '';
      }, 5000);
    }

    // Load products on page load
    window.addEventListener('load', loadProducts);
  </script>
</body>
</html>
